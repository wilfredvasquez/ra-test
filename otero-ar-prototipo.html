<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Galería Otero RA — Prototipo</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    .info {
      position: fixed; top: 10px; left: 10px; right: 10px;
      background: rgba(0,0,0,0.7); color: white; padding: 10px;
      border-radius: 8px; z-index: 1000; font-size: 14px;
    }
  </style>
</head>
<body>

<div class="info">
  <strong>Coloritmo en RA</strong><br>
  Apunta la cámara al marcador "Hiro" para ver la obra.
</div>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  renderer="logarithmicDepthBuffer: true;"
  vr-mode-ui="enabled: false">

  <!-- Marcador Hiro: el clásico cuadro negro con la palabra HIRO dentro -->
  <a-marker preset="hiro">

    <!-- Estructura del Coloritmo: un tablón vertical con bandas y formas geométricas -->
    <!-- Otero usaba tablones verticales con ritmos de bandas blancas/oscuras y formas de color -->

    <a-entity position="0 0.5 0" rotation="0 0 0">

      <!-- Fondo del tablón (plano vertical) -->
      <a-box position="0 0 0" width="0.6" height="2" depth="0.02"
             color="#F5F0E8"></a-box>

      <!-- Bandas verticales oscuras (el ritmo característico) -->
      <a-box position="-0.22 0 0.015" width="0.015" height="2" depth="0.01" color="#1A1A1A"></a-box>
      <a-box position="-0.10 0 0.015" width="0.015" height="2" depth="0.01" color="#1A1A1A"></a-box>
      <a-box position="0.02 0 0.015" width="0.015" height="2" depth="0.01" color="#1A1A1A"></a-box>
      <a-box position="0.14 0 0.015" width="0.015" height="2" depth="0.01" color="#1A1A1A"></a-box>
      <a-box position="0.26 0 0.015" width="0.015" height="2" depth="0.01" color="#1A1A1A"></a-box>

      <!-- Formas geométricas de color (cuadrados y rectángulos en rojo, azul, amarillo) -->
      <a-box position="-0.15 0.7 0.02" width="0.10" height="0.10" depth="0.01" color="#D62828"></a-box>
      <a-box position="0.08 0.4 0.02" width="0.10" height="0.15" depth="0.01" color="#1E5FBF"></a-box>
      <a-box position="-0.05 0.1 0.02" width="0.12" height="0.08" depth="0.01" color="#F4B400"></a-box>
      <a-box position="0.20 -0.2 0.02" width="0.08" height="0.12" depth="0.01" color="#D62828"></a-box>
      <a-box position="-0.18 -0.5 0.02" width="0.10" height="0.10" depth="0.01" color="#1E5FBF"></a-box>
      <a-box position="0.05 -0.8 0.02" width="0.14" height="0.08" depth="0.01" color="#F4B400"></a-box>

      <!-- Animación sutil de rotación, evocando el carácter cinético de Otero -->
      <a-animation
        attribute="rotation"
        to="0 360 0"
        dur="20000"
        repeat="indefinite"
        easing="linear"></a-animation>

    </a-entity>

    <!-- Etiqueta de la obra -->
    <a-text value="Coloritmo (homenaje)\nAlejandro Otero"
            position="0 -0.7 0"
            align="center"
            color="#000"
            width="3"></a-text>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
